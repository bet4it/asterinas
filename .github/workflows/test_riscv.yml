name: "Test riscv64  "

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  basic-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        id: ['lint', 'compile', 'usermode_test', 'ktest']
      fail-fast: false
    steps:
      - name: Free disk space
        # Remove unused packages from the host to save disk space.
        run: sudo rm -rf /usr/lib/google-cloud-sdk/* /usr/local/lib/android/* /usr/share/dotnet/*
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
      - name: Run basic tests
        uses: ./.github/actions/test
        with:
          auto_test: 'general'
          arch: 'riscv64'

  integration-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - test_id: 'boot-debug-smp4'
            smp: 4

          - test_id: 'boot-release'
            release: true

          - test_id: 'conformance-release'
            release: true

          - test_id: 'conformance-release-smp4'
            release: true
            smp: 4
      fail-fast: false
    steps:
      - name: Free disk space
        # Remove unused packages from the host to save disk space.
        run: sudo rm -rf /usr/lib/google-cloud-sdk/* /usr/local/lib/android/* /usr/share/dotnet/*
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
      - name: Run integration tests ${{ (startsWith(matrix.test_id, 'conformance') && 'with LTP') || '' }}
        uses: ./.github/actions/test
        with:
          auto_test: ${{ (startsWith(matrix.test_id, 'boot') && 'boot') || 'conformance' }}
          release: ${{ matrix.release != false }}
          arch: 'riscv64'
          conformance_test_suite: 'ltp'
