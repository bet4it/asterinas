name: Test ISO image

on:
  workflow_dispatch:
  pull_request:
    paths:
      - distro/**
      - .github/workflows/test_iso_image.yml
      - tools/nixos/**
  push:
    branches:
      - main
    paths:
      - distro/**
      - .github/workflows/test_iso_image.yml
      - tools/nixos/**

jobs:
  iso-test:
    runs-on: ubuntu-4-cores-150GB-ssd
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
      - name: Build Asterinas NixOS ISO installer image
        run: |
          NIXOS_TEST_SUITE=hello nix run .#iso --no-write-lock-file
      - name: Run ISO image and install Asterinas NixOS
        run: |
          nix run .#run-iso --no-write-lock-file || true
          tail --lines 10 .nix-run/qemu.log | grep -q "^Installation finished" || (echo "Test ISO failed" && exit 1)
          echo "Test ISO succeeds!"
      - name : Run Asterinas NixOS
        run: |
          NIXOS_TEST_SUITE=hello nix run .#run-nixos --no-write-lock-file
