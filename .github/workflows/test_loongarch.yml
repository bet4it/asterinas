name: "Test loongarch64  "

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  basic-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        id: ['lint', 'compile']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix
      - name: Run basic tests
        uses: ./.github/actions/test
        with:
          auto_test: 'general'
          arch: 'loongarch64'
