name: Publish OSDK and OSTD

on:
  workflow_dispatch:
  pull_request:
    paths:
      - VERSION
      - ostd/**
      - osdk/**
  push:
    branches:
      - main
    paths: 
      - VERSION

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-nix

      - name: Publish OSTD and OSDK (dry run)
        # On pull request, set `--dry-run` to check whether they can be published
        if: github.event_name == 'pull_request'
        run: nix run .#publish-osdk-and-ostd --no-write-lock-file -- --dry-run
      
      - name: Publish OSTD and OSDK
        if: github.repository == 'asterinas/asterinas' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        env:
          REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: nix run .#publish-osdk-and-ostd --no-write-lock-file -- --token ${REGISTRY_TOKEN}
